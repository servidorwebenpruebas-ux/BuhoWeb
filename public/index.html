<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BuhoWeb | Cuadro de Mandos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen font-sans">

    <!-- [ES]  BARRA DE NAVEGACIÓN -->
    <!-- [EN]  NAVIGATION BAR -->
    <nav class="border-b border-slate-800 p-5 bg-slate-900/80 backdrop-blur-md sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center font-black text-xl shadow-lg">B</div>
                <h1 class="text-xl font-black italic tracking-tighter uppercase">BuhoWeb <span class="text-blue-500 font-medium tracking-normal text-sm">MVP</span></h1>
            </div>
            <span class="text-[10px] font-bold text-slate-500 uppercase tracking-widest bg-slate-900 border border-slate-800 px-3 py-1 rounded-full">Modo Abierto</span>
        </div>
    </nav>

    <div class="container mx-auto px-6 py-10 max-w-5xl">
        
        <!-- [ES]  FORMULARIO DE ALTA DE SITIO WEB A MONITORIZAR-->
        <!-- [EN]  FORM TO ADD A NEW WEBSITE TO MONITOR -->
        <div class="bg-slate-900 p-8 rounded-[2.5rem] border border-slate-800 shadow-2xl mb-12">
            <h2 class="text-[10px] font-black text-blue-500 uppercase tracking-[0.4em] mb-4 text-center lg:text-left">Monitorizar nuevo sitio web</h2>
            <div class="flex flex-col md:flex-row gap-4">
                <input id="nombre" type="text" placeholder="Nombre (ej. Mi Web)" class="flex-1 bg-slate-950 border border-slate-800 p-4 rounded-2xl outline-none focus:ring-1 ring-blue-500 text-sm transition-all">
                <input id="url" type="text" placeholder="dominio.es" class="flex-1 bg-slate-950 border border-slate-800 p-4 rounded-2xl outline-none focus:ring-1 ring-blue-500 text-sm font-mono transition-all">
                <button onclick="añadir()" class="bg-blue-600 hover:bg-blue-500 px-10 py-4 rounded-2xl font-black text-xs uppercase tracking-widest transition-all shadow-lg active:scale-95">Vigilar</button>
            </div>
        </div>

        <!-- [ES] REJILLA DE SITIOS -->
        <!-- [EN] ASSETS GRID -->
        <div id="grid-sitios" class="grid grid-cols-1 md:grid-cols-2 gap-8 text-white">
            <!-- [ES] Carga de fomra dinámica con JavaScript -->
            <!-- [EN]  Dynamically loaded with JavaScript -->
        </div>
    </div>

    <script>
        async function refrescarPanel() {
            const res = await fetch('/api/activos');
            const sitios = await res.json();
            const grid = document.getElementById('grid-sitios');
            grid.innerHTML = '';

            sitios.forEach(s => {
                const esOK = s.ultimo_estado === 'OK';
                grid.innerHTML += `
                    <div class="bg-slate-900/40 backdrop-blur-md rounded-[3rem] p-8 border border-slate-800 shadow-2xl hover:border-blue-500/40 transition-all duration-500">
                        <div class="flex justify-between items-start mb-8">
                            <div>
                                <h3 class="text-xl font-bold uppercase tracking-tight">${s.nombre}</h3>
                                <p class="text-slate-500 text-[10px] font-mono mt-1">${s.url}</p>
                            </div>
                            <span class="px-4 py-1.5 rounded-full text-[10px] font-black tracking-widest ${esOK ? 'text-emerald-400 bg-emerald-500/10' : 'text-rose-500 bg-rose-500/10'} border border-current/20">
                                ${s.ultimo_estado}
                            </span>
                        </div>
                        
                        <!-- [ES]  ÁREA DE GRÁFICA -->
                        <!-- [EN]  GRAPH AREA -->
                        <div class="h-32 w-full">
                            <canvas id="grafica-${s.id}"></canvas>
                        </div>
                        
                        <div class="flex justify-end mt-8 pt-4 border-t border-slate-800/50">
                            <button onclick="eliminar(${s.id})" class="text-slate-600 hover:text-rose-500 text-[9px] font-black uppercase tracking-widest transition-colors">Dejar de vigilar</button>
                        </div>
                    </div>
                `;
                setTimeout(() => cargarDatosGrafica(s.id), 200);
            });
        }

        async function cargarDatosGrafica(id) {
            const res = await fetch(`/api/grafica/${id}`);
            const datos = await res.json();
            const ctx = document.getElementById(`grafica-${id}`).getContext('2d');
            const valores = datos.map(d => d.latencia);
            
            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: valores.map(() => ''),
                    datasets: [{
                        data: valores,
                        borderColor: '#3b82f6', // [ES] La línea azul de la Gráfica | [EN] The blue line of the Graph
                        borderWidth: 4,
                        pointRadius: 0,
                        tension: 0.45,
                        fill: true,
                        backgroundColor: (c) => {
                            const g = c.chart.ctx.createLinearGradient(0, 0, 0, 150);
                            g.addColorStop(0, 'rgba(59, 130, 246, 0.2)');
                            g.addColorStop(1, 'rgba(59, 130, 246, 0)');
                            return g;
                        }
                    }]
                },
                options: { 
                    responsive: true, maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: { x: { display: false }, y: { display: false, min: 0 } }
                }
            });
        }

        async function añadir() {
            const nombre = document.getElementById('nombre').value;
            const url = document.getElementById('url').value;
            if(!nombre || !url) return alert("Rellene los campos.");
            await fetch('/api/activos', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ nombre, url })
            });
            document.getElementById('nombre').value = '';
            document.getElementById('url').value = '';
            refrescarPanel();
        }

        async function eliminar(id) {
            if(confirm("¿Eliminar vigilancia?")) {
                await fetch(`/api/activos/${id}`, { method: 'DELETE' });
                refrescarPanel();
            }
        }

        refrescarPanel();
        setInterval(refrescarPanel, 40000);
    </script>
</body>
</html>
